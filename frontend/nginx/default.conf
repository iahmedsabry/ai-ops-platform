server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # KAI SPA (ingress path prefix /kai)
    location = /kai {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /kai/ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location ^~ /kai/ {
        root /usr/share/nginx/html;
        rewrite ^/kai/.*$ /index.html break;
    }
}
